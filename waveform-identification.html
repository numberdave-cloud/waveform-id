<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waveform Identification</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1E1A17;
    --text: #EAE0D0;
    --text-dim: #6F6557;
    --accent: #C07838;
    --accent-glow: #D8904A;
    --correct: #7AB369;
    --correct-glow: #95C485;
    --wrong: #C84F2A;
    --wrong-glow: #E06A3F;
    --border: rgba(234, 224, 208, 0.18);
    --border-soft: rgba(234, 224, 208, 0.10);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 400;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }

  .widget {
    width: 720px;
    max-width: calc(100vw - 40px);
    border: 1px solid var(--border);
    padding: 36px 44px 32px;
    position: relative;
  }

  /* ----- HEADER ----- */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 30px;
  }

  .title {
    font-size: 12px;
    letter-spacing: 0.14em;
    color: var(--text);
    font-weight: 500;
    text-transform: uppercase;
    padding-top: 2px;
  }

  .score-area {
    text-align: right;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }

  .status {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 500;
    transition: color 0.3s ease;
  }

  .status.scored {
    color: var(--text);
  }

  .reset-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 500;
    cursor: pointer;
    padding: 0;
    transition: color 0.15s ease;
  }

  .reset-btn:hover {
    color: var(--text);
  }

  /* ----- MAIN ----- */
  .main {
    display: flex;
    align-items: stretch;
    gap: 32px;
    margin-bottom: 36px;
    min-height: 220px;
  }

  /* ----- VOLUME FADER ----- */
  .volume-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 64px;
    flex-shrink: 0;
  }

  .fader-container {
    flex: 1;
    width: 100%;
    display: flex;
    justify-content: center;
    padding: 4px 0;
  }

  .fader-track {
    position: relative;
    width: 2px;
    background: var(--border);
    height: 100%;
    cursor: pointer;
  }

  /* Tick marks on track */
  .fader-track::before {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    width: 1px;
    transform: translateX(-50%);
    background: repeating-linear-gradient(
      to bottom,
      var(--border-soft) 0,
      var(--border-soft) 1px,
      transparent 1px,
      transparent 14px
    );
  }

  .fader-handle {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 26px;
    height: 10px;
    background: var(--bg);
    border: 1px solid var(--accent);
    cursor: grab;
    user-select: none;
    touch-action: none;
  }

  .fader-handle::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    height: 1px;
    background: var(--accent);
    transform: translateY(-50%);
  }

  .fader-handle:active {
    cursor: grabbing;
    border-color: var(--accent-glow);
  }

  .fader-handle:active::after {
    background: var(--accent-glow);
  }

  .fader-readout {
    margin-top: 14px;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    text-align: center;
    min-width: 56px;
  }

  .fader-label {
    margin-top: 6px;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text);
    font-weight: 500;
  }

  /* ----- DIVIDER ----- */
  .divider {
    width: 1px;
    background: var(--border);
    align-self: stretch;
  }

  /* ----- WAVEFORM BUTTONS ----- */
  .waveform-buttons {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    align-items: center;
  }

  .wave-btn {
    background: none;
    border: 1px solid var(--border);
    padding: 22px 8px 18px;
    font-family: inherit;
    color: var(--text);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    transition: border-color 0.25s ease, box-shadow 0.25s ease, background-color 0.25s ease, transform 0.1s ease;
    position: relative;
  }

  .wave-btn:hover:not(.locked) {
    border-color: var(--accent);
  }

  .wave-btn:hover:not(.locked) .wave-icon path,
  .wave-btn:hover:not(.locked) .wave-icon polyline {
    stroke: var(--accent-glow);
  }

  .wave-btn:active:not(.locked) {
    transform: scale(0.985);
  }

  .wave-icon {
    width: 56px;
    height: 28px;
    overflow: visible;
  }

  .wave-icon path,
  .wave-icon polyline {
    fill: none;
    stroke: var(--accent);
    stroke-width: 1.4;
    stroke-linecap: square;
    stroke-linejoin: miter;
    transition: stroke 0.25s ease;
  }

  .wave-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text);
    font-weight: 500;
    transition: color 0.25s ease;
  }

  /* answered states */
  .wave-btn.locked {
    cursor: default;
  }

  .wave-btn.correct {
    border-color: var(--correct);
    box-shadow: 0 0 0 1px var(--correct), 0 0 18px rgba(122, 179, 105, 0.35);
  }

  .wave-btn.correct .wave-icon path,
  .wave-btn.correct .wave-icon polyline {
    stroke: var(--correct-glow);
  }

  .wave-btn.correct .wave-label {
    color: var(--correct-glow);
  }

  .wave-btn.wrong {
    border-color: var(--wrong);
    box-shadow: 0 0 0 1px var(--wrong), 0 0 18px rgba(200, 79, 42, 0.35);
  }

  .wave-btn.wrong .wave-icon path,
  .wave-btn.wrong .wave-icon polyline {
    stroke: var(--wrong-glow);
  }

  .wave-btn.wrong .wave-label {
    color: var(--wrong-glow);
  }

  .wave-btn.reveal {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 18px rgba(216, 144, 74, 0.35);
  }

  .wave-btn.reveal .wave-icon path,
  .wave-btn.reveal .wave-icon polyline {
    stroke: var(--accent-glow);
  }

  .wave-btn.reveal .wave-label {
    color: var(--accent-glow);
  }

  /* ----- PLAY BUTTON ----- */
  .play-area {
    display: flex;
    justify-content: center;
  }

  .play-btn {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 500;
    padding: 13px 48px;
    cursor: pointer;
    min-width: 180px;
    transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease, transform 0.1s ease;
  }

  .play-btn:hover {
    background: var(--accent);
    color: var(--bg);
  }

  .play-btn:active {
    transform: scale(0.985);
  }

  .play-btn.playing {
    border-color: var(--accent-glow);
    color: var(--accent-glow);
    animation: pulse 1.2s ease-in-out infinite;
  }

  .play-btn.playing:hover {
    background: var(--accent-glow);
    color: var(--bg);
  }

  .play-btn.locked {
    opacity: 0.3;
    cursor: not-allowed;
    pointer-events: none;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(216, 144, 74, 0); }
    50% { box-shadow: 0 0 16px 0 rgba(216, 144, 74, 0.3); }
  }
</style>
</head>
<body>

<div class="widget">
  <div class="header">
    <div class="title">WAVEFORM IDENTIFICATION</div>
    <div class="score-area">
      <div class="status" id="status">READY</div>
      <button class="reset-btn" id="resetBtn">RESET SCORE</button>
    </div>
  </div>

  <div class="main">
    <div class="volume-section">
      <div class="fader-container">
        <div class="fader-track" id="faderTrack">
          <div class="fader-handle" id="faderHandle"></div>
        </div>
      </div>
      <div class="fader-readout" id="faderReadout">-10.0 dB</div>
      <div class="fader-label">VOLUME</div>
    </div>

    <div class="divider"></div>

    <div class="waveform-buttons">
      <button class="wave-btn" data-wave="sine">
        <svg class="wave-icon" viewBox="0 0 80 40">
          <polyline points="0,20 5,14.64 10,10.10 15,7.07 20,6 25,7.07 30,10.10 35,14.64 40,20 45,25.36 50,29.90 55,32.93 60,34 65,32.93 70,29.90 75,25.36 80,20"/>
        </svg>
        <span class="wave-label">SINE</span>
      </button>

      <button class="wave-btn" data-wave="triangle">
        <svg class="wave-icon" viewBox="0 0 80 40">
          <polyline points="0,20 20,6 60,34 80,20"/>
        </svg>
        <span class="wave-label">TRIANGLE</span>
      </button>

      <button class="wave-btn" data-wave="square">
        <svg class="wave-icon" viewBox="0 0 80 40">
          <polyline points="0,20 0,6 40,6 40,34 80,34 80,20"/>
        </svg>
        <span class="wave-label">SQUARE</span>
      </button>

      <button class="wave-btn" data-wave="sawtooth">
        <svg class="wave-icon" viewBox="0 0 80 40">
          <polyline points="0,34 40,6 40,34 80,6"/>
        </svg>
        <span class="wave-label">SAW</span>
      </button>
    </div>
  </div>

  <div class="play-area">
    <button class="play-btn" id="playBtn">PLAY</button>
  </div>
</div>

<script>
  // ========== CONFIG ==========
  const WAVEFORMS = ['sine', 'triangle', 'square', 'sawtooth'];
  const NOTE_FREQS = { A1: 55, A2: 110, A3: 220, A4: 440, A5: 880, A6: 1760, C3: 130.81 };

  const OSC_PEAK_DBFS = -12;

  const FADER_INITIAL_DB = -10;
  const FADER_MIN_DB = -40;
  const FADER_MAX_DB = 10;

  const ADVANCE_DELAY_MS = 500;

  // Level 100 plays a single cycle of C3 (~7.65ms)
  const LVL_100_DUR = 1 / NOTE_FREQS.C3;

  // Streak-based difficulty escalation. Ordered most-restrictive-first;
  // getLevel() picks the first whose threshold the current streak meets.
  // Rule: when note duration shortens, gap halves too.
  const STREAK_LEVELS = [
    { atStreak: 100, sequence: ['C3'],                          noteDur: LVL_100_DUR, gap: 0      },
    { atStreak: 90,  sequence: ['A5'],                          noteDur: 0.035,       gap: 0      },
    { atStreak: 80,  sequence: ['A4'],                          noteDur: 0.035,       gap: 0      },
    { atStreak: 70,  sequence: ['A1'],                          noteDur: 0.05,        gap: 0      },
    { atStreak: 60,  sequence: ['A1','A2','A3','A4','A5'],      noteDur: 0.05,        gap: 0      },
    { atStreak: 50,  sequence: ['A3'],                          noteDur: 0.125,       gap: 0      },
    { atStreak: 40,  sequence: ['A1','A4'],                     noteDur: 0.125,       gap: 0.125  },
    { atStreak: 30,  sequence: ['A1','A4'],                     noteDur: 0.25,        gap: 0.25   },
    { atStreak: 20,  sequence: ['A6','A5','A4','A3','A2','A1'], noteDur: 0.2,         gap: 0      },
    { atStreak: 10,  sequence: ['A3','A4','A3','A2'],           noteDur: 0.25,        gap: 0.25   },
    { atStreak: 0,   sequence: ['A3','A4','A3','A2','A3','A4'], noteDur: 0.5,         gap: 0.5    }
  ];

  function getLevel(s) {
    for (const lvl of STREAK_LEVELS) {
      if (s >= lvl.atStreak) return lvl;
    }
    return STREAK_LEVELS[STREAK_LEVELS.length - 1];
  }

  // On a wrong answer, drop to the threshold of the next-lower level
  // instead of zeroing out the streak.
  function previousStreak(s) {
    const current = getLevel(s);
    const idx = STREAK_LEVELS.indexOf(current);
    if (idx === STREAK_LEVELS.length - 1) return 0; // already at base tier
    return STREAK_LEVELS[idx + 1].atStreak;
  }

  // Envelope timing scales with note duration so short notes don't get eaten
  // by attack+release.
  function envelopeFor(dur) {
    if (dur >= 0.25) return { attack: 0.008,  release: 0.05  };
    if (dur >= 0.15) return { attack: 0.006,  release: 0.035 };
    if (dur >= 0.04) return { attack: 0.004,  release: 0.025 };
    // Ultra-short (single-cycle territory): scale envelope to note length so
    // the wave shape isn't swallowed by ramps.
    return { attack: dur * 0.1, release: dur * 0.2 };
  }

  const KEY_TO_WAVE = { '1': 'sine', '2': 'triangle', '3': 'square', '4': 'sawtooth' };

  // ========== STATE ==========
  let audioCtx = null;
  let masterGain = null;
  let currentWave = null;
  let hasAnswered = false;
  let correctCount = 0;
  let totalCount = 0;
  let streak = 0;
  let scheduledSources = [];
  let masterDb = FADER_INITIAL_DB;
  let playEndTimer = null;
  let advanceTimer = null;
  let celebrating = false;
  let celebrationSource = null;
  let celebrationAdvanceTimer = null;

  // ========== ELEMENTS ==========
  const $status = document.getElementById('status');
  const $resetBtn = document.getElementById('resetBtn');
  const $playBtn = document.getElementById('playBtn');
  const $faderHandle = document.getElementById('faderHandle');
  const $faderTrack = document.getElementById('faderTrack');
  const $faderReadout = document.getElementById('faderReadout');
  const $waveBtns = document.querySelectorAll('.wave-btn');

  // ========== AUDIO ==========
  function dbToGain(db) {
    return Math.pow(10, db / 20);
  }

  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = dbToGain(masterDb);
      masterGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  function stopClip() {
    scheduledSources.forEach(osc => {
      try { osc.stop(0); } catch (e) {}
      try { osc.disconnect(); } catch (e) {}
    });
    scheduledSources = [];
    if (playEndTimer) {
      clearTimeout(playEndTimer);
      playEndTimer = null;
    }
    $playBtn.classList.remove('playing');
  }

  function base64ToArrayBuffer(b64) {
    const binary = atob(b64);
    const len = binary.length;
    const bytes = new Uint8Array(len);
    for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);
    return bytes.buffer;
  }

  function playCelebration() {
    celebrating = true;
    $playBtn.classList.add('locked');
    ensureAudio();

    const after = () => {
      celebrationAdvanceTimer = setTimeout(() => {
        celebrationAdvanceTimer = null;
        celebrating = false;
        $playBtn.classList.remove('locked');
        startRound();
      }, 1000);
    };

    try {
      const buf = base64ToArrayBuffer(CELEBRATION_OGG_B64);
      audioCtx.decodeAudioData(buf).then(audioBuffer => {
        const src = audioCtx.createBufferSource();
        src.buffer = audioBuffer;
        src.connect(masterGain);
        celebrationSource = src;
        src.onended = () => {
          celebrationSource = null;
          after();
        };
        src.start(audioCtx.currentTime);
      }).catch(err => {
        console.error('Celebration decode failed:', err);
        after();
      });
    } catch (err) {
      console.error('Celebration playback failed:', err);
      after();
    }
  }

  function stopCelebration() {
    if (celebrationSource) {
      try { celebrationSource.stop(0); } catch (e) {}
      try { celebrationSource.disconnect(); } catch (e) {}
      celebrationSource = null;
    }
    if (celebrationAdvanceTimer) {
      clearTimeout(celebrationAdvanceTimer);
      celebrationAdvanceTimer = null;
    }
    celebrating = false;
  }

  function scheduleNote(freq, t0, dur, attack, release, peak) {
    const osc = audioCtx.createOscillator();
    osc.type = currentWave;
    osc.frequency.value = freq;

    const env = audioCtx.createGain();
    env.gain.setValueAtTime(0, t0);
    env.gain.linearRampToValueAtTime(peak, t0 + attack);
    env.gain.setValueAtTime(peak, t0 + dur - release);
    env.gain.linearRampToValueAtTime(0, t0 + dur);

    osc.connect(env);
    env.connect(masterGain);

    osc.start(t0);
    osc.stop(t0 + dur + 0.02);

    scheduledSources.push(osc);
  }

  function playClip() {
    ensureAudio();
    stopClip();

    const startAt = audioCtx.currentTime + 0.05;
    const peak = dbToGain(OSC_PEAK_DBFS);

    const level = getLevel(streak);
    const seq = level.sequence;
    const dur = level.noteDur;
    const gap = level.gap;
    const env = envelopeFor(dur);

    for (let i = 0; i < seq.length; i++) {
      const freq = NOTE_FREQS[seq[i]];
      const t0 = startAt + i * (dur + gap);
      scheduleNote(freq, t0, dur, env.attack, env.release, peak);
    }

    // total audible end (no trailing gap)
    const totalDur = seq.length * dur + (seq.length - 1) * gap;
    const totalMs = (0.05 + totalDur) * 1000;
    $playBtn.classList.add('playing');
    playEndTimer = setTimeout(() => {
      $playBtn.classList.remove('playing');
      playEndTimer = null;
    }, totalMs);
  }

  // ========== ROUND LOGIC ==========
  function pickRandomWave() {
    // Never repeat the same waveform in consecutive rounds.
    const options = currentWave
      ? WAVEFORMS.filter(w => w !== currentWave)
      : WAVEFORMS;
    return options[Math.floor(Math.random() * options.length)];
  }

  function clearWaveStates() {
    $waveBtns.forEach(b => {
      b.classList.remove('correct', 'wrong', 'reveal', 'locked');
    });
  }

  function startRound() {
    if (advanceTimer) {
      clearTimeout(advanceTimer);
      advanceTimer = null;
    }
    clearWaveStates();
    currentWave = pickRandomWave();
    hasAnswered = false;
    playClip();
  }

  function handleAnswer(wave) {
    if (!currentWave || hasAnswered) return;

    hasAnswered = true;
    totalCount++;
    stopClip(); // silence audio so the result has a clean beat

    const userBtn = document.querySelector(`.wave-btn[data-wave="${wave}"]`);
    const correctBtn = document.querySelector(`.wave-btn[data-wave="${currentWave}"]`);

    const wasCorrect = (wave === currentWave);

    if (wasCorrect) {
      correctCount++;
      streak++;
      userBtn.classList.add('correct');
    } else {
      userBtn.classList.add('wrong');
      correctBtn.classList.add('reveal');
      if (streak < 100) {
        streak = previousStreak(streak);
      }
      // At level 100+, streak stays put — they continue at the top tier.
    }

    $waveBtns.forEach(b => b.classList.add('locked'));
    updateScore();

    // Just crossed into streak 100 with a correct answer? Play celebration,
    // then advance into level 100 after a 1-second beat.
    if (wasCorrect && streak === 100) {
      playCelebration();
      return;
    }

    // Normal auto-advance.
    advanceTimer = setTimeout(() => {
      advanceTimer = null;
      startRound();
    }, ADVANCE_DELAY_MS);
  }

  function updateScore() {
    $status.textContent = `${correctCount}/${totalCount} CORRECT`;
    $status.classList.add('scored');
  }

  function resetScore() {
    if (advanceTimer) {
      clearTimeout(advanceTimer);
      advanceTimer = null;
    }
    stopCelebration();
    stopClip();
    $playBtn.classList.remove('locked');
    correctCount = 0;
    totalCount = 0;
    streak = 0;
    hasAnswered = false;
    currentWave = null;
    clearWaveStates();
    $status.textContent = 'READY';
    $status.classList.remove('scored');
  }

  // ========== PLAY BUTTON ==========
  $playBtn.addEventListener('click', () => {
    if (celebrating) return;
    if (advanceTimer) {
      // skip the 500ms pause
      clearTimeout(advanceTimer);
      advanceTimer = null;
      startRound();
    } else if (!currentWave) {
      startRound();
    } else if (hasAnswered) {
      // shouldn't normally land here (timer handles it), but stay safe
      startRound();
    } else {
      // mid-round replay
      playClip();
    }
  });

  $resetBtn.addEventListener('click', resetScore);

  $waveBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      if (!currentWave) return; // can't answer before a round starts
      handleAnswer(btn.dataset.wave);
    });
  });

  // Keyboard shortcuts: 1=sine, 2=triangle, 3=square, 4=saw
  document.addEventListener('keydown', (e) => {
    if (e.repeat) return;
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    const wave = KEY_TO_WAVE[e.key];
    if (!wave) return;
    if (celebrating) return;
    if (!currentWave || hasAnswered) return;
    handleAnswer(wave);
  });

  // ========== FADER ==========
  function setMasterDb(db) {
    masterDb = Math.max(FADER_MIN_DB, Math.min(FADER_MAX_DB, db));
    const range = FADER_MAX_DB - FADER_MIN_DB;
    const norm = (masterDb - FADER_MIN_DB) / range;

    // position handle: norm=1 → top, norm=0 → bottom
    const trackH = $faderTrack.clientHeight;
    const handleH = $faderHandle.offsetHeight;
    const topPx = (1 - norm) * (trackH - handleH);
    $faderHandle.style.top = topPx + 'px';

    const sign = masterDb >= 0 ? '+' : '';
    $faderReadout.textContent = sign + masterDb.toFixed(1) + ' dB';

    if (audioCtx && masterGain) {

    const handleH = $faderHandle.offsetHeight;
    const usable = rect.height - handleH;
    let y = clientY - rect.top - handleH / 2;
    y = Math.max(0, Math.min(usable, y));
    const norm = 1 - (y / usable);
    return FADER_MIN_DB + norm * (FADER_MAX_DB - FADER_MIN_DB);
